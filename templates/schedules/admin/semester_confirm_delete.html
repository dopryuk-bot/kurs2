{% extends "base.html" %}

{% block title %}Видалити семестр{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white fw-semibold">
        <i class="bi bi-exclamation-triangle me-2"></i>Підтвердження видалення
      </div>
      <div class="card-body p-4">
        <p>Ви справді хочете видалити семестр?</p>
        <div class="bg-light rounded p-3 mb-4 fw-semibold">{{ object.name }}</div>
        <p class="text-danger small mb-4">
          <i class="bi bi-exclamation-circle me-1"></i>
          Разом із семестром буде видалено весь пов'язаний розклад.
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-trash me-1"></i>Видалити
            </button>
            <a href="{% url 'schedules:semester_list' %}" class="btn btn-outline-secondary">Скасувати</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
